  erp_db_postgres:
    container_name: "erp-postgres"
    env_file:
      - .env
    image: 'postgres:16.4'
    environment:
      POSTGRES_USER: ${ERP_PG_USER}
      POSTGRES_PASSWORD: ${ERP_PG_PASSWORD}
      POSTGRES_DB: ${ERP_PG_DATABASE}
    ports:
      - "${ERP_PG_PORT}:5432"

  erp_flyway:
    container_name: "erp-flyway"
    env_file:
      - .env
    environment:
      FLYWAY_URL: jdbc:postgresql://erp_db_postgres:5432/${ERP_PG_DATABASE}
      FLYWAY_USER: ${ERP_PG_USER}
      FLYWAY_PASSWORD: ${ERP_PG_PASSWORD}
    command:
      - migrate
    volumes:
      - ./src/main/resources/db/schema:/flyway/sql
    image: 'flyway/flyway:11.4'
    depends_on:
      erp_db_postgres:
        condition: service_started
        restart: true

