services:
  erp_zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: "erp-zookeeper"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181

  erp_kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: "erp-kafka"
    depends_on:
      - erp_zookeeper
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: erp_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://erp_kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-cluster-ui
    ports:
      - "9095:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: erp_kafka:9092
    depends_on:
      - erp_kafka

  erp_db_postgres:
    image: 'postgres:16.4'
    container_name: erp-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${ERP_PG_USER}
      POSTGRES_PASSWORD: ${ERP_PG_PASSWORD}
      POSTGRES_DB: ${ERP_PG_DATABASE}
    ports:
      - "${ERP_PG_PORT}:5432"

  erp_flyway:
    container_name: erp-flyway
    env_file:
      - .env
    environment:
      FLYWAY_URL: jdbc:postgresql://erp_db_postgres:5432/${ERP_PG_DATABASE}
      FLYWAY_USER: ${ERP_PG_USER}
      FLYWAY_PASSWORD: ${ERP_PG_PASSWORD}
    command:
      - migrate
    volumes:
      - ./src/main/resources/db/schema:/flyway/sql
    image: 'flyway/flyway:11.4'
    depends_on:
      erp_db_postgres:
        condition: service_started
        restart: true

  erp_mongo:
    container_name: 'erp-mongo'
    image: mongo:8.0
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo_user
      - MONGO_INITDB_ROOT_PASSWORD=mongo_password
      - MONGO_INITDB_DATABASE=erp_db_mongo

  erp_service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PG_HOST: erp_db_postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      KAFKA_URL: erp_kafka:9092
      MONGO_DB_URI: mongodb://mongo_user:mongo_password@mongo-1:27017/erp_db_mongo?authSource=admin
    ports:
      - "8091:8091"
    depends_on:
      - erp_db_postgres