services:
  erp_zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: "erp-zookeeper"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - ${ZOOKEEPER_OUTSIDE_PORT}:2181
    networks:
      - sopd_sign_network

  erp_kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: "erp-kafka"
    depends_on:
      - erp_zookeeper
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: erp_zookeeper:2181
      KAFKA_LISTENERS: 'PLAINTEXT://erp_kafka:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://erp_kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

#  kafka-ui:
#    image: provectuslabs/kafka-ui:latest
#    container_name: kafka-cluster-ui
#    ports:
#      - "9095:8080"
#    environment:
#      KAFKA_CLUSTERS_0_NAME: local
#      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: crackhash_kafka:9092
#    depends_on:
#      - crackhash_kafka
#    networks:
#      - crackhash-net

  erp_db_postgres:
    image: 'postgres:16.4'
    container_name: ${CONTAINER_DB_NAME}
    hostname: ${ERP_PG_HOST}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${ERP_PG_USER}
      POSTGRES_PASSWORD: ${ERP_PG_PASSWORD}
      POSTGRES_DB: ${ERP_PG_DATABASE}
    ports:
      - "${ERP_PG_PORT}:5432"
    networks:
      - erp_network

  erp_flyway:
    container_name: ${CONTAINER_FLYWAY_NAME}
    env_file:
      - .env
    environment:
      FLYWAY_URL: jdbc:postgresql://${ERP_PG_HOST}:${ERP_PG_PORT}/${ERP_PG_DATABASE}
      FLYWAY_USER: ${ERP_PG_USER}
      FLYWAY_PASSWORD: ${ERP_PG_PASSWORD}
    command:
      - migrate
    volumes:
      - ./src/main/resources/db/schema:/flyway/sql
    image: 'flyway/flyway:11.4'
    depends_on:
      erp_db_postgres:
        condition: service_started
        restart: true
    networks:
      - erp_network

  erp_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_BACKEND_NAME}
    hostname: ${HOSTNAME_BACKEND}
    env_file:
      - .env
    environment:
      PG_HOST: ${ERP_PG_HOST}
      PG_PORT: ${ERP_PG_PORT}
      PG_USER: ${ERP_PG_USER}
      PG_PASSWORD: ${ERP_PG_PASSWORD}
      PUBLIC_KEY_FILE_PATH: keys/public/jws-public.pem
    ports:
      - "${CONSENT_SERVICE_PORT}:8080"
    volumes:
      - ./src/main/resources/keys/public:/keys/public
    depends_on:
      - erp_db_postgres
    networks:
      - erp_network

networks:
  erp_network:
    driver: bridge