spring:
  application:
    name: sitebackend-global-erp
  datasource:
    url: jdbc:postgresql://${PG_HOST}:${PG_PORT}/${ERP_PG_DATABASE}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8091