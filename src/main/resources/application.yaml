spring:
  application:
    name: sitebackend-global-erp
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5431}/${ERP_PG_DATABASE:erp_database}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.yandex.ru
    port: 465
    username: malinovskiy.denis@yandex.ru
    password: password
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.socketFactory.class: javax.net.ssl.SSLSocketFactory
      mail.smtp.connectiontimeout: 30000
      mail.smtp.timeout: 30000
      mail.smtp.writetimeout: 30000
      mail.debug: true

server:
  port: 8091

entity-factory:
  kafka:
    consumer:
      config:
        bootstrap-servers: ${KAFKA_URL:localhost:9092}
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto-offset-reset: earliest
